<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Decompiling Future Crew — Second Reality (browser-port)</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #ddd;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        display: block;
        touch-action: none;
      }
      #hud {
        position: fixed;
        left: 12px;
        bottom: 12px;
        font-size: 11px;
        opacity: 0.55;
        pointer-events: none;
        user-select: none;
        text-shadow: 0 1px 2px #000;
      }
      #glenz-link {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 10;
        font-size: 12px;
        color: #6cf;
        opacity: 0.75;
        text-decoration: none;
        padding: 0.35em 0.7em;
        border: 1px solid #6cf;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.4);
        text-shadow: 0 1px 2px #000;
      }
      #glenz-link:hover,
      #glenz-link:focus {
        background: #6cf;
        color: #000;
        opacity: 1;
        outline: none;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <a id="glenz-link" href="glenz/">GLENZ · viewer &amp; muziek →</a>
    <div id="hud">DecompilingFutureCrew · v0.6.0-Yodel · tap=start audio / skip · long-press=pause · double-tap=back · H=hud · M=mute · music: Skaven + Purple Motion (1993)</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
