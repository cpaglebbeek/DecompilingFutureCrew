# Second Reality (DecompilingFutureCrew) — server-level nginx locations
# Pattern: include vanuit /etc/nginx/sites-enabled/horsecloud (zoals asm2web/llmshapes/horsesafe).
# Geen poort, geen backend: statische HTML/CSS/JS + S3M-audio + chiptune3 AudioWorklet.
# Webroot serveert de Vite-build die met base=/SecondReality/ is gebouwd.
# GLENZ-subsysteem leeft onder /SecondReality/glenz/.

location = /SecondReality {
    auth_basic off;
    return 301 /SecondReality/;
}

location /SecondReality/ {
    auth_basic off;
    alias /var/www/secondreality/web/;
    index index.html;
    try_files $uri $uri/ /SecondReality/index.html;

    types {
        text/html                 html;
        text/css                  css;
        text/javascript           js;
        application/json          json;
        application/wasm          wasm;
        image/svg+xml             svg;
        application/octet-stream  s3m;
        application/octet-stream  bin;
    }

    # No-cache voor HTML/JS/CSS (revalidatie elke load — ontwikkel-modus)
    add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
